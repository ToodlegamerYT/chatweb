<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Chat</title>
<style>
  body { margin:0; font-family: Arial; background:#3498db; color:#fff; }
  #login, #chat { display:none; padding:20px; }
  input, button { padding:10px; margin:5px 0; border-radius:5px; border:none; }
  button { cursor:pointer; }
  #messages, #pmBox { height:200px; overflow-y:scroll; border:1px solid #fff; padding:10px; background: rgba(255,255,255,0.1); margin-bottom:10px; }
  #users { margin-bottom:10px; }
  .message { margin:5px 0; }
  .timestamp { font-size:0.7em; color:#ddd; }
</style>
</head>
<body>

<div id="login">
  <h2>Login / Signup</h2>
  <input type="text" id="username" placeholder="Username"><br>
  <button onclick="signup()">Sign Up / Login</button>
</div>

<div id="chat">
  <h2>Rooms</h2>
  <input type="text" id="roomName" placeholder="Room name">
  <button onclick="createOrJoinRoom()">Create / Join Room</button>
  <div id="roomList"></div>
  
  <h3>Room Chat</h3>
  <div id="currentRoom"></div>
  <div id="users"><b>Active Users:</b></div>
  <div id="messages"></div>
  <input type="text" id="msgInput" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>

  <h3>Private Message</h3>
  <input type="text" id="pmRecipient" placeholder="Recipient username">
  <input type="text" id="pmInput" placeholder="Type PM">
  <button onclick="sendPM()">Send PM</button>
  <div id="pmBox"></div>

  <button onclick="logout()">Logout</button>
  <button onclick="deleteRoom()">Delete Room</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBDYu6t0sed0qJG0fzKYLfHYr8kgTUzCNQ",
  authDomain: "chatweb-11-6b2ba.firebaseapp.com",
  projectId: "chatweb-11-6b2ba",
  storageBucket: "chatweb-11-6b2ba.firebasestorage.app",
  messagingSenderId: "876004924325",
  appId: "1:876004924325:web:a5430c7dfc3a7c3b33a64c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = '';
let currentRoom = '';
let roomUsersRef = null;

// LOGIN
document.getElementById('login').style.display='block';

function signup(){
  const u = document.getElementById('username').value.trim();
  if(!u) return alert("Enter username");
  currentUser = u;
  localStorage.setItem('username', u);
  showChat();
}

function showChat(){
  document.getElementById('login').style.display='none';
  document.getElementById('chat').style.display='block';
  loadRoomList();
}

// LOGOUT
function logout(){
  if(currentRoom && roomUsersRef) roomUsersRef.child(currentUser).remove();
  location.reload();
}

// LOAD ROOM LIST
function loadRoomList(){
  db.ref('rooms').on('value', snap=>{
    const listDiv = document.getElementById('roomList');
    listDiv.innerHTML = '<b>Available Rooms:</b><br>';
    snap.forEach(room=>{
      const roomName = room.key;
      const btn = document.createElement('button');
      btn.innerText = 'Join ' + roomName;
      btn.onclick = ()=>joinRoom(roomName);
      listDiv.appendChild(btn);
      listDiv.appendChild(document.createElement('br'));
    });
  });
}

// CREATE OR JOIN ROOM
function createOrJoinRoom(){
  const roomName = document.getElementById('roomName').value.trim();
  if(!roomName) return alert("Enter room name");
  joinRoom(roomName);
}

// JOIN ROOM
function joinRoom(roomName){
  currentRoom = roomName;
  document.getElementById('currentRoom').innerText = 'Room: ' + currentRoom;

  const roomRef = db.ref('rooms/'+currentRoom);

  // Set creator if room empty
  roomRef.child('creator').get().then(snap=>{
    if(!snap.exists()) roomRef.child('creator').set(currentUser);
  });

  // RESET listeners to avoid duplicates
  if(roomUsersRef) roomUsersRef.off();
  db.ref('rooms/'+currentRoom+'/messages').off();
  db.ref('rooms/'+currentRoom+'/pm').off();

  // JOIN room
  roomUsersRef = roomRef.child('users');
  roomUsersRef.child(currentUser).set(true);
  roomUsersRef.child(currentUser).onDisconnect().remove();

  updateUsersList();
  loadMessages();
  loadPMs();
}

// UPDATE USERS
function updateUsersList(){
  roomUsersRef.on('value', snap=>{
    const users = Object.keys(snap.val()||{});
    document.getElementById('users').innerHTML = '<b>Active Users:</b> '+users.join(', ');
  });
}

// SEND MESSAGE
function sendMessage(){
  const text = document.getElementById('msgInput').value.trim();
  if(!text || !currentRoom) return;
  db.ref('rooms/'+currentRoom+'/messages').push({
    user: currentUser,
    text,
    timestamp: Date.now()
  });
  document.getElementById('msgInput').value='';
}

// LOAD MESSAGES
function loadMessages(){
  const messagesRef = db.ref('rooms/'+currentRoom+'/messages');
  messagesRef.on('child_added', snap=>{
    const msg = snap.val();
    const msgDiv = document.getElementById('messages');
    msgDiv.innerHTML += '<div class="message"><b>'+msg.user+'</b>: '+msg.text+
      ' <span class="timestamp">'+new Date(msg.timestamp).toLocaleTimeString()+'</span></div>';
    msgDiv.scrollTop = msgDiv.scrollHeight;
  });
}

// SEND PM
function sendPM(){
  const recipient = document.getElementById('pmRecipient').value.trim();
  const text = document.getElementById('pmInput').value.trim();
  if(!recipient || !text) return;
  const pmId = recipient+'_'+currentUser;
  db.ref('rooms/'+currentRoom+'/pm/'+pmId).push({
    from: currentUser,
    text,
    timestamp: Date.now()
  });
  document.getElementById('pmInput').value='';
}

// LOAD PM
function loadPMs(){
  const pmRef = db.ref('rooms/'+currentRoom+'/pm');
  pmRef.on('child_added', snap=>{
    const pmBox = document.getElementById('pmBox');
    snap.forEach(pm=>{
      const val = pm.val();
      if(val.from!==currentUser){
        pmBox.innerHTML += '<div><b>'+val.from+'</b>: '+val.text+
          ' <span class="timestamp">'+new Date(val.timestamp).toLocaleTimeString()+'</span></div>';
        pmBox.scrollTop = pmBox.scrollHeight;
      }
    });
  });
}

// DELETE ROOM (only creator)
function deleteRoom(){
  const roomRef = db.ref('rooms/'+currentRoom);
  roomRef.child('creator').get().then(snap=>{
    if(snap.exists() && snap.val()===currentUser){
      roomRef.remove();
      alert('Room deleted');
      location.reload();
    } else alert('Only creator can delete room');
  });
}
</script>
</body>
</html>
