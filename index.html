<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Chat App</title>
<style>
  body { margin:0; font-family: Arial; background:#3498db; color:#fff; }
  #login, #chat, #admin { display:none; padding:20px; }
  input, button { padding:10px; margin:5px 0; border-radius:5px; border:none; }
  button { cursor:pointer; }
  #messages { height:300px; overflow-y:scroll; border:1px solid #fff; padding:10px; background: rgba(255,255,255,0.1);}
  #users { margin-bottom:10px; }
  .message { margin:5px 0; }
  .timestamp { font-size:0.7em; color:#ddd; }
</style>
</head>
<body>

<div id="login">
  <h2>Login / Signup</h2>
  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="chat">
  <h2>Chat Room</h2>
  <input type="text" id="roomName" placeholder="Room name">
  <button onclick="joinRoom()">Join / Create Room</button>
  <div id="roomInfo"></div>
  <div id="users"><b>Active Users:</b></div>
  <div id="messages"></div>
  <input type="text" id="msgInput" placeholder="Type a message">
  <button onclick="sendMessage()">Send</button>
  <button onclick="logout()">Logout</button>
  <button onclick="openAdmin()">Admin Panel</button>

  <h3>Private Messages</h3>
  <input type="text" id="pmRecipient" placeholder="Recipient username">
  <input type="text" id="pmInput" placeholder="Type PM">
  <button onclick="sendPM()">Send PM</button>
  <div id="pmBox"></div>
</div>

<div id="admin">
  <h2>Admin Panel</h2>
  <input type="text" id="banUser" placeholder="Username to ban">
  <button onclick="banUser()">Ban</button><br>
  <input type="text" id="kickUser" placeholder="Username to kick">
  <button onclick="kickUser()">Kick</button><br>
  <button onclick="deleteRoom()">Delete Room</button><br>
  <button onclick="closeAdmin()">Close Admin</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBDYu6t0sed0qJG0fzKYLfHYr8kgTUzCNQ",
  authDomain: "chatweb-11-6b2ba.firebaseapp.com",
  projectId: "chatweb-11-6b2ba",
  storageBucket: "chatweb-11-6b2ba.firebasestorage.app",
  messagingSenderId: "876004924325",
  appId: "1:876004924325:web:a5430c7dfc3a7c3b33a64c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = '';
let currentRoom = '';
let roomUsersRef = null;

document.getElementById('login').style.display = 'block';

// Signup / Login
function signup(){
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  if(!u||!p) return alert("Enter username & password");
  localStorage.setItem('username', u);
  localStorage.setItem('password', p);
  currentUser = u;
  showChat();
}
function login(){
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  if(localStorage.getItem('username')===u && localStorage.getItem('password')===p){
    currentUser = u;
    showChat();
  } else alert("Wrong username/password");
}
function showChat(){
  document.getElementById('login').style.display='none';
  document.getElementById('chat').style.display='block';
}

// Logout
function logout(){
  if(currentRoom && roomUsersRef) roomUsersRef.child(currentUser).remove();
  location.reload();
}

// Join Room
function joinRoom(){
  currentRoom = document.getElementById('roomName').value.trim();
  if(!currentRoom) return alert("Enter room name");

  db.ref('banned/'+currentUser).get().then(s=>{
    if(s.exists()) return alert("You are banned!");
    setupRoom();
  });
}
function setupRoom(){
  const roomRef = db.ref('rooms/'+currentRoom);
  roomRef.child('created').set(Date.now());
  roomUsersRef = roomRef.child('users');
  roomUsersRef.child(currentUser).set(true);
  roomUsersRef.child(currentUser).onDisconnect().remove();

  updateUsersList();
  loadMessages();
  loadPMs();
  document.getElementById('roomInfo').innerText = 'Room created: '+new Date().toLocaleTimeString();

  // Update lastActive
  roomRef.child('lastActive').set(firebase.database.ServerValue.TIMESTAMP);
}

// Users list
function updateUsersList(){
  roomUsersRef.on('value', snap=>{
    const users = Object.keys(snap.val()||{});
    document.getElementById('users').innerHTML='<b>Active Users:</b> '+users.join(', ');
  });
}

// Send Message
function sendMessage(){
  const text = document.getElementById('msgInput').value;
  if(!text || !currentRoom) return;
  db.ref('rooms/'+currentRoom+'/messages').push({
    user: currentUser,
    text,
    timestamp: Date.now()
  });
  db.ref('rooms/'+currentRoom+'/lastActive').set(firebase.database.ServerValue.TIMESTAMP);
  document.getElementById('msgInput').value='';
}

// Load messages
function loadMessages(){
  db.ref('rooms/'+currentRoom+'/messages').on('child_added', snap=>{
    const msg = snap.val();
    const msgDiv = document.getElementById('messages');
    msgDiv.innerHTML += '<div class="message"><b>'+msg.user+'</b>: '+msg.text+
      ' <span class="timestamp">'+new Date(msg.timestamp).toLocaleTimeString()+'</span></div>';
    msgDiv.scrollTop = msgDiv.scrollHeight;
  });
}

// Private Messages
function sendPM(){
  const recipient = document.getElementById('pmRecipient').value;
  const text = document.getElementById('pmInput').value;
  if(!recipient||!text) return;
  const pmId = recipient+'_'+currentUser;
  db.ref('rooms/'+currentRoom+'/pm/'+pmId).push({from:currentUser, text, timestamp:Date.now()});
  document.getElementById('pmInput').value='';
}

function loadPMs(){
  db.ref('rooms/'+currentRoom+'/pm').on('child_added', snap=>{
    const pmBox = document.getElementById('pmBox');
    snap.forEach(pm=>{
      const val = pm.val();
      if(val.from!==currentUser){
        pmBox.innerHTML += '<div><b>'+val.from+'</b>: '+val.text+
          ' <span class="timestamp">'+new Date(val.timestamp).toLocaleTimeString()+'</span></div>';
        pmBox.scrollTop = pmBox.scrollHeight;
      }
    });
  });
}

// Admin
function openAdmin(){document.getElementById('admin').style.display='block';}
function closeAdmin(){document.getElementById('admin').style.display='none';}
function banUser(){
  const u = document.getElementById('banUser').value;
  if(!u) return;
  db.ref('banned/'+u).set(true);
  db.ref('rooms/'+currentRoom+'/users/'+u).remove();
  alert(u+' banned');
}
function kickUser(){
  const u = document.getElementById('kickUser').value;
  if(!u) return;
  db.ref('rooms/'+currentRoom+'/users/'+u).remove();
  alert(u+' kicked');
}
function deleteRoom(){
  if(!currentRoom) return;
  db.ref('rooms/'+currentRoom).remove();
  alert('Room deleted');
  location.reload();
}

// Auto-delete empty rooms
setInterval(()=>{
  db.ref('rooms').get().then(snap=>{
    const now = Date.now();
    snap.forEach(room=>{
      const data = room.val();
      const lastActive = data.lastActive||0;
      const users = data.users ? Object.keys(data.users).length : 0;
      if(users===0 && (now-lastActive)>60000){
        db.ref('rooms/'+room.key).remove();
      }
    });
  });
}, 60000);
</script>
</body>
</html>
